<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Sign Up – UENR LibraTrack</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .login-panel {
      max-width: 400px;
      width: 100%;
      z-index: 10;
      position: relative;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-brand img {
      height: 60px;
      margin-bottom: 10px;
      animation: floatLogo 3s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
    }

    @keyframes floatLogo {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
        filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
      }
    }

    .login-brand h2 {
      font-size: 24px;
      margin: 0;
      color: var(--text-primary);
    }

    .login-brand p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 5px;
    }

    /* Alert Box Styling */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      border: 1px solid transparent;
      animation: fadeIn 0.3s ease;
    }
    .alert.show {
      display: block;
    }
    .alert-title {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .alert-error {
      background: rgba(220, 38, 38, 0.15);
      border-color: rgba(220, 38, 38, 0.3);
      color: #fca5a5;
    }
    .alert-success {
      background: rgba(34, 197, 94, 0.15);
      border-color: rgba(34, 197, 94, 0.3);
      color: #86efac;
    }
  </style>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="uenr.png" />
  <link rel="apple-touch-icon" href="uenr.png" />

</head>

<body class="dark-theme">

  <!-- Reusing the backdrop -->
  <div class="backdrop"></div>
  <div class="backdrop-overlay"></div>

  <div class="login-wrapper">
    <div class="card login-panel">
      <div class="login-brand">
        <img src="uenr.png" alt="UENR Logo" />
        <h2>Student Sign Up</h2>
        <p>Create a new student account</p>
      </div>

      <form id="signup-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="user-name">FULL NAME</label>
          <input class="form-input" id="user-name" type="text" placeholder="e.g. John Doe" required />
        </div>
        
        <div class="form-group">
          <label class="form-label" for="user-id">STUDENT EMAIL</label>
          <input class="form-input" id="user-id" type="text" placeholder="e.g. index@st.uenr.edu.gh" autocomplete="username"
            required />
        </div>

        <div class="form-group">
          <label class="form-label" for="user-password">PASSWORD / PIN</label>
          <input class="form-input" id="user-password" type="password" placeholder="Create a password"
            autocomplete="new-password" required />
        </div>

        <button type="submit" class="btn-submit" id="signup-btn">Create Account</button>
        
        <div id="login-link-container" style="text-align: center; margin-top: 15px;">
          <p style="color: var(--text-secondary); font-size: 14px;">Already have an account? <a href="login.html?role=student" style="color: var(--brand-blue); text-decoration: none; font-weight: 600;">Sign In</a></p>
        </div>
      </form>

      <div class="alert" id="signup-alert" style="margin-top:20px;">
        <div class="alert-title" id="signup-alert-title"></div>
        <div id="signup-alert-msg"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js?v=2"></script>
  <script src="app.js?v=2"></script>
  <script>
    const form = document.getElementById('signup-form');
    const nameInput = document.getElementById('user-name');
    const idInput = document.getElementById('user-id');
    const passInput = document.getElementById('user-password');
    const alertBox = document.getElementById('signup-alert');
    const alertTitle = document.getElementById('signup-alert-title');
    const alertMsg = document.getElementById('signup-alert-msg');
    const signupBtn = document.getElementById('signup-btn');

    function showAlert(type, title, msg) {
      alertBox.className = `alert show alert-${type}`;
      alertTitle.innerHTML = title;
      alertMsg.innerHTML = msg;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const email = idInput.value.trim();
      const password = passInput.value.trim();

      if (!name) { showAlert('error', 'Missing Name', 'Please enter your Full Name'); return; }
      if (!email) { showAlert('error', 'Missing Email', 'Please enter your Student Email'); return; }
      if (!password) { showAlert('error', 'Missing Password', 'Please create a Password or Code'); return; }

      const ogText = signupBtn.innerHTML;
      signupBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating Account...';
      signupBtn.disabled = true;

      // Use Supabase Auth
      supabaseClient.auth.signUp({
        email: email,
        password: password,
        options: { data: { full_name: name } }
      }).then(({ data: authData, error: authError }) => {
        signupBtn.innerHTML = ogText;
        signupBtn.disabled = false;
        
        if (authError) {
          showAlert('error', 'Sign Up Failed', authError.message);
        } else {
          showAlert('success', 'Account Created', 'Successfully registered! Redirecting to login...');
          setTimeout(() => {
             window.location.href = 'login.html?role=student';
          }, 2000);
        }
      });
    });
  </script>
</body>

</html>
