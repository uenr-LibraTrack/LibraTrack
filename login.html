<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Login – UENR LibraTrack</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .login-panel {
      max-width: 400px;
      width: 100%;
      z-index: 10;
      position: relative;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-brand img {
      height: 60px;
      margin-bottom: 10px;
      animation: floatLogo 3s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
    }

    @keyframes floatLogo {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
        filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
      }
    }

    .login-brand h2 {
      font-size: 24px;
      margin: 0;
      color: var(--text-primary);
    }

    .login-brand p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 5px;
    }

    /* Alert Box Styling */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      border: 1px solid transparent;
      animation: fadeIn 0.3s ease;
    }
    .alert.show {
      display: block;
    }
    .alert-title {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .alert-error {
      background: rgba(220, 38, 38, 0.15);
      border-color: rgba(220, 38, 38, 0.3);
      color: #fca5a5;
    }
  </style>
  <link rel="icon" type="image/png" href="uenr.png" />
  <link rel="apple-touch-icon" href="uenr.png" />

</head>

<body class="dark-theme">

  <!-- Reusing the backdrop -->
  <div class="backdrop"></div>
  <div class="backdrop-overlay"></div>

  <div class="login-wrapper">
    <div class="card login-panel">
      <div class="login-brand">
        <img src="uenr.png" alt="UENR Logo" />
        <h2>UENR LibraTrack</h2>
        <p>Sign in with your Library Email and 4-digit code</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="user-id">LIBRARY EMAIL</label>
          <input class="form-input" id="user-id" type="text" placeholder="LIBRARY EMAIL" autocomplete="username"
            required />
        </div>

        <div class="form-group">
          <label class="form-label" for="user-password">4-Digit Code</label>
          <input class="form-input" id="user-password" type="password" placeholder="Enter 4-digit code"
            autocomplete="current-password" maxlength="4" inputmode="numeric" required />
        </div>

        <button type="submit" class="btn-submit" id="login-btn">Sign In</button>
      </form>

      <div class="alert" id="login-alert" style="margin-top:20px;">
        <div class="alert-title" id="login-alert-title"></div>
        <div id="login-alert-msg"></div>
      </div>
    </div>
  </div>

  <!-- We load app.js but we don't want it to run requireAuth on this page -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js?v=2"></script>
  <script src="app.js?v=2"></script>
  <script>
    const form = document.getElementById('login-form');
    const idInput = document.getElementById('user-id');
    const passInput = document.getElementById('user-password');
    const alertBox = document.getElementById('login-alert');
    const alertTitle = document.getElementById('login-alert-title');
    const alertMsg = document.getElementById('login-alert-msg');

    function showAlert(type, title, msg) {
      alertBox.className = `alert show alert-${type}`;
      alertTitle.innerHTML = title;
      alertMsg.innerHTML = msg;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const userId = idInput.value.trim();
      const password = passInput.value.trim();

      if (!userId) {
        showAlert('error', 'Missing ID', 'Please enter your Library Email');
        return;
      }
      if (!password) {
        showAlert('error', 'Missing Code', 'Please enter your 4-digit Code');
        return;
      }

      // Basic validation mockup
      let role = 'student';
      let name = userId.split('@')[0];

      // Allow specific admin login
      if (userId.toLowerCase() === 'admin' || userId.toLowerCase() === 'library@uenr.edu.gh') {
        if (password !== '2011') {
          showAlert('error', 'Authentication Failed', 'Incorrect 4-digit code. Please try again.');
          return;
        }
        role = 'admin';
        name = 'Administrator';
      } else if (!userId.toLowerCase().includes('@uenr.edu.gh') && !/^\d{6,10}$/.test(userId)) {
        // Must be email ending in @uenr.edu.gh (including st.uenr.edu.gh) or a numeric ID of 6-10 digits
        showAlert('error', 'Invalid Entry', 'Please check your Email and 4-digit code.');
        return;
      }

      // Success mockup
      loginUser(userId, name, role);
      window.location.href = 'index.html';
    });
  </script>
</body>

</html>
