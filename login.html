<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Login – UENR LibraTrack</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .login-panel {
      max-width: 400px;
      width: 100%;
      z-index: 10;
      position: relative;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-brand img {
      height: 60px;
      margin-bottom: 10px;
      animation: floatLogo 3s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
    }

    @keyframes floatLogo {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
        filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
      }
    }

    .login-brand h2 {
      font-size: 24px;
      margin: 0;
      color: var(--text-primary);
    }

    .login-brand p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 5px;
    }

    /* Alert Box Styling */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      border: 1px solid transparent;
      animation: fadeIn 0.3s ease;
    }
    .alert.show {
      display: block;
    }
    .alert-title {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .alert-error {
      background: rgba(220, 38, 38, 0.15);
      border-color: rgba(220, 38, 38, 0.3);
      color: #fca5a5;
    }
  </style>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="uenr.png" />
  <link rel="apple-touch-icon" href="uenr.png" />

</head>

<body class="dark-theme">

  <!-- Reusing the backdrop -->
  <div class="backdrop"></div>
  <div class="backdrop-overlay"></div>

  <div class="login-wrapper">
    <div class="card login-panel">
      <div class="login-brand">
        <img src="uenr.png" alt="UENR Logo" />
        <h2 id="login-title">Sign In</h2>
        <p id="login-desc">Sign in to your account</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" id="label-id" for="user-id">Email</label>
          <input class="form-input" id="user-id" type="text" placeholder="Enter Email" autocomplete="username"
            required />
        </div>

        <div class="form-group">
          <label class="form-label" id="label-password" for="user-password">Password / Code</label>
          <input class="form-input" id="user-password" type="password" placeholder="Enter Code"
            autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn-submit" id="login-btn">Sign In</button>
        
        <div id="signup-link-container" style="text-align: center; margin-top: 15px; display: none;">
          <p style="color: var(--text-secondary); font-size: 14px;">Don't have an account? <a href="signup.html" style="color: var(--brand-blue); text-decoration: none; font-weight: 600;">Sign Up</a></p>
        </div>
      </form>

      <div class="alert" id="login-alert" style="margin-top:20px;">
        <div class="alert-title" id="login-alert-title"></div>
        <div id="login-alert-msg"></div>
      </div>
    </div>
  </div>

  <!-- We load app.js but we don't want it to run requireAuth on this page -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js?v=2"></script>
  <script src="app.js?v=2"></script>
  <script>
    const form = document.getElementById('login-form');
    const idInput = document.getElementById('user-id');
    const passInput = document.getElementById('user-password');
    const alertBox = document.getElementById('login-alert');
    const alertTitle = document.getElementById('login-alert-title');
    const alertMsg = document.getElementById('login-alert-msg');

    const urlParams = new URLSearchParams(window.location.search);
    const roleParam = urlParams.get('role') || 'student';

    if (roleParam === 'admin') {
      document.getElementById('login-title').textContent = 'Admin Sign In';
      document.getElementById('login-desc').textContent = 'Sign in with your Library Email and 4-digit code';
      document.getElementById('label-id').textContent = 'LIBRARY EMAIL';
      idInput.placeholder = 'LIBRARY EMAIL';
      document.getElementById('label-password').textContent = '4-DIGIT CODE';
      passInput.placeholder = 'Enter 4-digit code';
      passInput.maxLength = 4;
      passInput.inputMode = 'numeric';
    } else {
      document.getElementById('login-title').textContent = 'Student Sign In';
      document.getElementById('login-desc').textContent = 'Sign in with your Student Email and Password';
      document.getElementById('label-id').textContent = 'STUDENT EMAIL';
      idInput.placeholder = 'e.g. index@st.uenr.edu.gh';
      document.getElementById('label-password').textContent = 'PASSWORD / PIN';
      passInput.placeholder = 'Enter your password';
      passInput.removeAttribute('maxlength');
      passInput.removeAttribute('inputmode');
      document.getElementById('signup-link-container').style.display = 'block';
    }

    function showAlert(type, title, msg) {
      alertBox.className = `alert show alert-${type}`;
      alertTitle.innerHTML = title;
      alertMsg.innerHTML = msg;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const userId = idInput.value.trim();
      const password = passInput.value.trim();

      if (!userId) {
        showAlert('error', 'Missing ID', 'Please enter your Email');
        return;
      }
      if (!password) {
        showAlert('error', 'Missing Code', 'Please enter your Password or Code');
        return;
      }

      let role = roleParam;
      let name = userId.split('@')[0];

      if (role === 'admin') {
        // Use hardcoded admin login
        if ((userId.toLowerCase() !== 'admin' && !userId.toLowerCase().includes('library@')) || password !== '2011') {
          showAlert('error', 'Authentication Failed', 'Incorrect email or 4-digit code. Please try again.');
          return;
        }
        name = 'Administrator';
        loginUser(userId, name, role);
        window.location.href = 'admin.html';
      } else {
        const ogText = document.getElementById('login-btn').innerHTML;
        document.getElementById('login-btn').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';
        document.getElementById('login-btn').disabled = true;

        // Use Supabase Auth directly
        supabaseClient.auth.signInWithPassword({ email: userId, password: password })
          .then(({ data: authData, error: authError }) => {
            document.getElementById('login-btn').innerHTML = ogText;
            document.getElementById('login-btn').disabled = false;

            if (authError) {
              showAlert('error', 'Login Failed', authError.message || 'Incorrect email or password.');
            } else {
              const fullName = authData.user?.user_metadata?.full_name || name;
              loginUser(userId, fullName, role);
              window.location.href = 'index.html';
            }
          });
      }
    });
  </script>
</body>

</html>
