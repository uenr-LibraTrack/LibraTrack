<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Notifications – UENR LibraTrack</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    .notif-page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .notif-header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .notif-filters {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .filter-tab {
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition);
    }

    .filter-tab:hover {
      background: rgba(255, 255, 255, 0.7);
    }

    .filter-tab.active {
      background: var(--brand-blue);
      color: white;
      border-color: var(--brand-blue);
    }

    .notifs-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .notif-card {
      background: var(--bg-card);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      display: flex;
      gap: 16px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .notif-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
    }

    .notif-card.type-closure::before {
      background: var(--brand-burgundy);
    }

    .notif-card.type-emergency::before {
      background: #ef4444;
    }

    .notif-card.type-availability::before {
      background: var(--brand-green);
    }

    .notif-card.type-announcement::before {
      background: var(--brand-blue);
    }

    .notif-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      background: rgba(43, 40, 40, 0.7);
    }

    .notif-icon-lg {
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .notif-content {
      flex: 1;
    }

    .notif-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      gap: 12px;
    }

    .notif-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      flex: 1;
      word-break: break-word;
    }

    .notif-time {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .notif-message {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .notif-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty-state {
      text-align: center;
      padding: 64px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .mark-all-read {
      font-size: 13px;
      color: var(--brand-blue);
      cursor: pointer;
      font-weight: 600;
      background: transparent;
      border: none;
    }

    .mark-all-read:hover {
      text-decoration: underline;
    }

    body.dark-theme .filter-tab {
      background: rgba(30, 41, 59, 0.5);
      border-color: rgba(255, 255, 255, 0.1);
    }

    body.dark-theme .filter-tab.active {
      background: var(--brand-blue);
    }

    body.dark-theme .notif-icon-lg {
      background: rgba(15, 23, 42, 0.5);
    }
  </style>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="uenr.png" />
  <link rel="apple-touch-icon" href="uenr.png" />

</head>

<body>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-brand">
      <img src="uenr.png" alt="UENR Logo" class="nav-logo" />
      <div class="nav-title">UENR LibraTrack</div>
    </div>

    <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleMobileMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="nav-links">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="admin.html" class="nav-link">Admin</a>
      <a href="checkin.html" class="nav-link primary">
        <span class="nav-link-full">Check In / Out</span>
        <span class="nav-link-short">Check In</span>
      </a>

      <!-- Notification Bell -->
      <a href="notifications.html" class="nav-link active" style="position:relative; display:flex; align-items:center;">
        <i class="fa-solid fa-bell" style="font-size: 18px;"></i>
        <span id="nav-bell-badge" class="bell-badge" style="display:none;">0</span>
      </a>

      <div class="nav-settings">
        <button class="nav-link" id="settings-btn"
          style="background:transparent; border:none; cursor:pointer; padding: 8px;"
          onclick="document.getElementById('settings-dropdown-nav').classList.toggle('show')">
          <i class="fa-solid fa-gear" style="font-size: 18px;"></i>
        </button>
        <div id="settings-dropdown-nav" class="settings-dropdown">
          <div class="settings-item">
            <span>Dark Mode</span>
            <label class="theme-switch" title="Toggle light / dark mode">
              <input type="checkbox" id="theme-toggle-switch" />
              <span class="switch-track">
                <span class="switch-knob"></span>
              </span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="container" style="max-width: 800px; margin: 40px auto; padding: 0 20px;">

    <div class="notif-page-header">
      <h1>Notifications</h1>
      <div class="notif-header-actions">
        <button id="enable-notifs-btn" class="btn-submit" style="width: auto; padding: 8px 16px; font-size: 13px; display: none;" onclick="requestNotificationPermission()">
          <i class="fa-solid fa-bell"></i> Enable Desktop Alerts
        </button>
        <button class="mark-all-read" onclick="handleMarkAllRead()"><i class="fa-solid fa-check"></i> Mark all as read</button>
      </div>
    </div>

    <div class="notif-filters" id="notif-filters">
      <div class="filter-tab active" onclick="setFilter('all')">All Updates</div>
      <div class="filter-tab" onclick="setFilter('announcement')"><i class="fa-solid fa-bullhorn"></i> Announcements
      </div>
      <div class="filter-tab" onclick="setFilter('availability')"><i class="fa-solid fa-chair"></i> Availability</div>
      <div class="filter-tab" onclick="setFilter('closure')"><i class="fa-solid fa-lock"></i> Closures</div>
      <div class="filter-tab" onclick="setFilter('emergency')"><i class="fa-solid fa-triangle-exclamation"></i>
        Emergency</div>
    </div>

    <div class="notifs-list" id="notifs-list">
      <!-- Injected by JS -->
    </div>

  </div>

  <footer class="footer">
    <div class="motto-text">Knowledge Integrity Impact</div>
    <p>&copy; 2026 UENR LibraTrack. All rights reserved.</p>
  </footer>

  <script src="app.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js?v=2"></script>
  <script src="notifications.js?v=2"></script>
  <script>
    let currentFilter = 'all';

    function setFilter(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      renderNotifications();
    }

    function timeAgo(ts) {
      const seconds = Math.floor((new Date() - ts) / 1000);
      let interval = seconds / 31536000;
      if (interval > 1) return Math.floor(interval) + "y ago";
      interval = seconds / 2592000;
      if (interval > 1) return Math.floor(interval) + "mo ago";
      interval = seconds / 86400;
      if (interval > 1) return Math.floor(interval) + "d ago";
      interval = seconds / 3600;
      if (interval > 1) return Math.floor(interval) + "h ago";
      interval = seconds / 60;
      if (interval > 1) return Math.floor(interval) + "m ago";
      return Math.floor(seconds) + "s ago";
    }

    function renderNotifications() {
      const list = document.getElementById('notifs-list');
      const notifs = getNotifications(currentFilter);

      // Mark as read when viewing
      markAllGuestRead();
      if (typeof updateNotificationBadge === 'function') updateNotificationBadge();

      if (notifs.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"><i class="fa-solid fa-box-open"></i></div>
            <h3>No notifications</h3>
            <p>You're all caught up!</p>
          </div>
        `;
        return;
      }

      list.innerHTML = notifs.map(n => {
        const config = getNotifConfig(n.type);
        const targetLabel = n.targetLibrary === 'all' ? 'All Libraries' : (getLibrary(n.targetLibrary)?.name || n.targetLibrary);

        return `
          <div class="notif-card type-${n.type} fade-in">
            <div class="notif-icon-lg">${config.icon}</div>
            <div class="notif-content">
              <div class="notif-header">
                <div class="notif-title">${n.title}</div>
                <div class="notif-time">${timeAgo(n.timestamp)}</div>
              </div>
              <div class="notif-message">${n.message}</div>
              <div class="notif-meta">
                <span class="status-badge ${config.colorClass}">${config.label}</span>
                <span class="status-badge status-closed" style="background:rgba(0,0,0,0.05);color:var(--text-secondary);border:none;"><i class="fa-solid fa-location-dot"></i> ${targetLabel}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function handleMarkAllRead() {
      markAllGuestRead();
      renderNotifications();
    }

    function requestNotificationPermission() {
      if (!("Notification" in window)) {
        alert("This browser does not support desktop notification");
      } else if (Notification.permission !== "denied") {
        Notification.requestPermission().then((permission) => {
          if (permission === "granted") {
            document.getElementById('enable-notifs-btn').style.display = 'none';
            new Notification("Notifications Enabled", { body: "You will now receive alerts for library updates!" });
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderNotifications();
      if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
        const btn = document.getElementById('enable-notifs-btn');
        if (btn) btn.style.display = 'block';
      }
    });
  </script>
</body>

</html>
