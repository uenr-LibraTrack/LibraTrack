<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Welcome – UENR LibraTrack</title>
  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    /* Full screen background for the entry page */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('Shelve1.jpeg') no-repeat center center fixed;
      background-size: cover;
    }

    .dark-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.7);
      /* Deep dark blue overlay for better contrast */
      backdrop-filter: blur(8px);
      /* Blurs the actual background image */
      -webkit-backdrop-filter: blur(8px);
      z-index: 1;
    }

    .glass-modal {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.85); /* Bright frosted white glass */
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-top: 1px solid rgba(255, 255, 255, 0.9); 
      border-left: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 50px 40px;
      text-align: center;
      color: #550303; /* Dark red text for perfect visibility on white */
      max-width: 450px;
      width: 90%;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .glass-modal img {
      height: 75px;
      margin-bottom: 24px;
      animation: floatLogo 3s ease-in-out infinite;
      filter: drop-shadow(0 4px 12px rgba(255, 255, 255, 0.4));
    }

    @keyframes floatLogo {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
        filter: drop-shadow(0 8px 20px rgba(255, 255, 255, 0.6));
      }
    }

    .glass-modal h2 {
      margin-top: 0;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    .glass-modal p {
      color: #550303;
      opacity: 0.85;
      font-weight: 600;
      margin-bottom: 35px;
      font-size: 16px;
      line-height: 1.6;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn-glass {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .primary-glass {
      background: #550303;
      border: 2px solid #550303;
      color: #ffffff !important;
      box-shadow: 0 4px 15px rgba(85, 3, 3, 0.3);
    }

    .primary-glass:hover {
      background: transparent;
      color: #550303 !important; 
      border-color: #550303;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(85, 3, 3, 0.2);
    }

    .secondary-glass {
      background: transparent;
      border: 2px solid #550303;
      color: #550303 !important;
    }

    .secondary-glass:hover {
      background: #550303;
      color: #ffffff !important; 
      border-color: #550303;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(85, 3, 3, 0.3);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="dark-overlay"></div>

  <div class="glass-modal">
    <img src="uenr.png" alt="UENR Logo" />
    <h2>UENR LibraTrack</h2>
    <p>TALK TO US!</p>

    <div class="modal-actions">
      <a href="login.html?role=student" class="btn-glass primary-glass">
        <i class="fa-solid fa-user-graduate"></i> Sign in as Student
      </a>
      <a href="login.html?role=admin" class="btn-glass secondary-glass">
        <i class="fa-solid fa-user-shield"></i> Sign in as Administrator
      </a>
    </div>
  </div>

</body>

</html>
